# Unattended agent auto-wake (1 minute)
#
# Pokes production: POST /api/agent/cron with Bearer CRON_SECRET.
# The server uses KEEPER_PRIVATE_KEY to runTick any LIVE+due agents.
#
# Required GitHub repo secrets:
#   APP_URL      — e.g. https://rite-mehidy-s-projects.vercel.app  (no trailing slash)
#   CRON_SECRET  — same value as Vercel env CRON_SECRET
#
# Optional:
#   VERCEL_AUTOMATION_BYPASS_SECRET — if Production has Deployment Protection
#
# Notes:
# - GitHub schedule is best-effort (can lag under load). For tighter 1m, also use
#   cron-job.org with the same URL + Authorization header.
# - Hobby Vercel native cron is only daily — this workflow is the real unattended path.

name: Agent keeper (unattended)

on:
  schedule:
    # Every minute (UTC)
    - cron: "* * * * *"
  # Manual run from Actions tab
  workflow_dispatch:

concurrency:
  group: agent-keeper
  cancel-in-progress: false

jobs:
  wake:
    name: Poke /api/agent/cron
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::Missing secret APP_URL (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing secret CRON_SECRET (must match Vercel CRON_SECRET)"
            exit 1
          fi
          echo "APP_URL host OK"

      - name: Health check
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          BASE="${APP_URL%/}"
          URL="${BASE}/api/agent/cron?health=1"
          if [ -n "$BYPASS" ]; then
            URL="${URL}&x-vercel-protection-bypass=${BYPASS}"
          fi
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: rite-agent-keeper/1.0" \
            "$URL" || true)
          echo "health HTTP $code"
          cat /tmp/health.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Health failed ($code). Check Deployment Protection, CRON_SECRET, APP_URL."
            exit 1
          fi

      - name: Run due ticks
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          BASE="${APP_URL%/}"
          URL="${BASE}/api/agent/cron?max=25"
          if [ -n "$BYPASS" ]; then
            URL="${URL}&x-vercel-protection-bypass=${BYPASS}"
          fi
          code=$(curl -sS -o /tmp/cron.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: rite-agent-keeper/1.0" \
            -H "Content-Type: application/json" \
            "$URL" || true)
          echo "cron HTTP $code"
          cat /tmp/cron.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Cron failed ($code)"
            exit 1
          fi
          # Soft signal if nothing ticked (still success — agents may be not due)
          if command -v jq >/dev/null 2>&1; then
            ticked=$(jq -r '.ticked // 0' /tmp/cron.json)
            echo "ticked=$ticked"
          fi
