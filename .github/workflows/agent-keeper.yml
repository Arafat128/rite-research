# Unattended agent auto-wake
#
# Secrets (repo → Settings → Secrets → Actions):
#   APP_URL      https://your-app.vercel.app  (no trailing slash)
#   CRON_SECRET  same as Vercel CRON_SECRET
# Optional:
#   VERCEL_AUTOMATION_BYPASS_SECRET
#
# For reliable 1-minute cadence, ALSO set free cron-job.org → same URL
# (GitHub schedules can lag under load).

name: Agent keeper (unattended)

on:
  schedule:
    # GitHub may delay high-frequency crons; still useful as backup.
    # For reliable 1m unattended, also run: node scripts/setup-qstash-cron.mjs
    # (Upstash QStash) or cron-job.org → POST /api/agent/cron with Bearer.
    - cron: "*/1 * * * *"
  workflow_dispatch:

concurrency:
  group: agent-keeper
  cancel-in-progress: false

jobs:
  wake:
    name: Poke /api/agent/cron
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::Missing secret APP_URL"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing secret CRON_SECRET"
            exit 1
          fi
          echo "APP_URL configured"

      - name: Health + run due ticks
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -e
          BASE="${APP_URL%/}"
          Q=""
          if [ -n "$BYPASS" ]; then
            Q="&x-vercel-protection-bypass=${BYPASS}"
          fi

          echo "== health =="
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: rite-agent-keeper/1.1" \
            "${BASE}/api/agent/cron?health=1${Q}")
          echo "HTTP $code"
          cat /tmp/health.json; echo
          test "$code" = "200"

          echo "== cron =="
          code=$(curl -sS -o /tmp/cron.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: rite-agent-keeper/1.1" \
            -H "Content-Type: application/json" \
            "${BASE}/api/agent/cron?max=40${Q}")
          echo "HTTP $code"
          cat /tmp/cron.json; echo
          test "$code" = "200"

          # Summarize for Actions log
          if command -v python3 >/dev/null 2>&1; then
            python3 - <<'PY'
          import json
          d=json.load(open("/tmp/cron.json"))
          print("ticked=", d.get("ticked"), "scanned=", d.get("scanned"))
          for r in d.get("results") or []:
              if r.get("ok"):
                  print("OK agent", r.get("agentId"), r.get("txHash","")[:18], r.get("telegram"))
              elif r.get("error"):
                  print("ERR", r.get("agentId"), str(r.get("error"))[:120])
              else:
                  print("skip", r.get("agentId"), r.get("skipped"))
          PY
          fi
